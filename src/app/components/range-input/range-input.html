<div class="input-group">
    <label class="input-label">
        {{ label }}
    </label>

    @if (formField) {
        <input
            id="ok"
            class="input"
            [placeholder]="placeholder"
            (input)="onInputChange($event)"
            [formField]="formField"
            type="range"
            list="browsers"
            (focus)="onFocus($event)"
            (blur)="onBlur()"
        />
    } @else {
        <input
            id="ok"
            class="range"
            [value]="value"
            [placeholder]="placeholder"
            (input)="onInputChange($event)"
            (blur)="onBlur()"
            [disabled]="disabled"
            [readonly]="readonly"
            list="browsers"
            (focus)="onFocus($event)"
            [min]="min"
            [max]="max"
            [step]="min"
        />
    }

    <!-- Errors -->
    @if (formField && formField()!.touched() && formField()!.invalid()) {
        <div class="text-(--color-error)">
            @for (error of formField()!.errors(); track error) {
                <p>{{ error.message }}</p>
            }
        </div>
    }
</div>
