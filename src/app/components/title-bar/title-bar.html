<div class="app-titlebar">
    <!-- LEFT -->
    <div class="app-titlebar-left" data-tauri-drag-region>
        <div class="app-brand">
            <img src="/logo.png" alt="Logo" class="app-logo" />
            <span class="app-title">VSCode Terminal</span>
        </div>

        <!-- @if (currentFile) {
            <div class="app-file-info">
                <span class="app-file-name">{{ currentFile }}</span>
                <span class="app-file-status" [class.dirty]="isDirty">
                    {{ isDirty ? '● Unsaved' : 'Saved' }}
                </span>
            </div>
        } @else {
            <span class="app-file-placeholder"> No document opened </span>
        } -->
    </div>

    <!-- RIGHT -->
    <div class="app-titlebar-right">
        <button class="app-btn icon" (click)="addTab()">+</button>
        <button class="app-btn icon" (click)="openSettings()">⚙</button>
        <button class="app-btn icon" (click)="minimize()">─</button>
        <button class="app-btn icon" (click)="toggleMaximize()">☐</button>
        <button class="app-btn icon close" (click)="close()">✕</button>
    </div>
</div>
