@if (settingService.openSetting()) {
    <div class="animate-fade-in">
        <!-- Modal -->
        <div
            class="w-150 max-h-[80vh] bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl flex flex-col overflow-hidden"
        >
            <!-- HEADER (fixed) -->
            <div
                class="flex items-center justify-between px-6 py-4 border-b border-zinc-200 dark:border-zinc-700"
            >
                <h2 class="text-xl font-semibold text-zinc-800 dark:text-zinc-100">⚙ Settings</h2>

                <button
                    (click)="closeSettings()"
                    class="px-3 py-1 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-700 dark:hover:bg-zinc-600 transition"
                >
                    ✕
                </button>
            </div>

            <!-- SCROLLABLE BODY -->
            <div class="overflow-y-auto p-6 space-y-6">
                <!-- DEFAULT PROFILE -->
                <app-select
                    label="Default Profile"
                    [formField]="settingService.settingsForm.defaultProfileId"
                    [options]="settingService.settingsForm.profiles().value()"
                    optionLabel="name"
                    optionValue="id"
                    [value]="defaultProfile()?.name ?? ''"
                ></app-select>

                <!-- THEME COLORS -->
                <app-select
                    label="Theme Colors"
                    [formField]="settingService.settingsForm.appThemeId"
                    [options]="appThemeOptions"
                    optionLabel="label"
                    optionValue="value"
                    [value]="settingService.settings().appThemeId"
                ></app-select>

                <!-- FONT FAMILY -->
                <app-select
                    label="Font Family"
                    [formField]="settingService.settingsForm.terminalSettings.fontFamily"
                    [options]="fontFamilieOptions"
                    optionLabel="label"
                    optionValue="value"
                    [value]="settingService.settingsForm.terminalSettings().value().fontFamily"
                ></app-select>

                <!-- FONT SIZE -->
                <app-number-input
                    label="Font Size"
                    [formField]="settingService.settingsForm.terminalSettings.fontSize"
                    [value]="settingService.settingsForm.terminalSettings().value().fontSize"
                ></app-number-input>

                <!-- FONT WEIGHT -->
                <app-number-input
                    label="Font Size"
                    [formField]="settingService.settingsForm.terminalSettings.fontWeight"
                    [value]="settingService.settingsForm.terminalSettings().value().fontWeight"
                ></app-number-input>

                <!-- FONT WEIGHT BOLD -->
                <app-number-input
                    label="Font Size"
                    [formField]="settingService.settingsForm.terminalSettings.fontWeightBold"
                    [value]="settingService.settingsForm.terminalSettings().value().fontWeightBold"
                ></app-number-input>

                <!-- LINE HEIGHT -->
                <app-number-input
                    label="Line Height"
                    [formField]="settingService.settingsForm.terminalSettings.lineHeight"
                    [value]="settingService.settingsForm.terminalSettings().value().lineHeight"
                ></app-number-input>

                <!-- LETTER SPACING -->
                <app-number-input
                    label="Line Height"
                    [formField]="settingService.settingsForm.terminalSettings.letterSpacing"
                    [value]="settingService.settingsForm.terminalSettings().value().letterSpacing"
                ></app-number-input>

                <!-- SMOOTH SCROLL DURATION -->
                <app-number-input
                    label="Line Height"
                    [formField]="settingService.settingsForm.terminalSettings.smoothScrollDuration"
                    [value]="
                        settingService.settingsForm.terminalSettings().value().smoothScrollDuration
                    "
                ></app-number-input>

                <!-- CURSOR STYLE -->
                <app-radio
                    name="cursorStyle"
                    [field]="settingService.settingsForm.terminalSettings.cursorStyle"
                    [options]="cursorStyleOptions"
                ></app-radio>

                <!-- CURSOR BLINK -->
                <app-checkbox
                    label="Cursor Blink"
                    [formField]="settingService.settingsForm.terminalSettings.cursorBlink"
                ></app-checkbox>

                <!-- CURSOR WIDTH -->
                <app-number-input
                    label="Line Height"
                    [formField]="settingService.settingsForm.terminalSettings.cursorWidth"
                    [value]="settingService.settingsForm.terminalSettings().value().cursorWidth"
                ></app-number-input>

                <!-- BACKGROUND STYLE -->
                <!-- <section class="space-y-2">
                    <h3 class="section-title">Background Effect</h3>
                    <div class="grid grid-cols-2 gap-2">
                        @for (bg of backgrounds; track bg) {
                            <button
                               
                                class="option-btn"
                                [class.active]="settings().terminalSettings.background === bg"
                            >
                                {{ bg }}
                            </button>
                        }
                    </div>
                </section> -->

                <button (click)="logData()">Save</button>
            </div>
        </div>
    </div>
}
