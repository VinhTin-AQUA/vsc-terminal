@if (isOpen()) {
    <div class="">
        <!-- Modal -->
        <div
            class="w-150 max-h-[80vh] bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl flex flex-col overflow-hidden"
        >
            <!-- HEADER (fixed) -->
            <div
                class="flex items-center justify-between px-6 py-4 border-b border-zinc-200 dark:border-zinc-700"
            >
                <h2 class="text-xl font-semibold text-zinc-800 dark:text-zinc-100">⚙ Settings</h2>

                <button
                    (click)="close()"
                    class="px-3 py-1 rounded-lg bg-zinc-200 hover:bg-zinc-300 dark:bg-zinc-700 dark:hover:bg-zinc-600 transition"
                >
                    ✕
                </button>
            </div>

            <!-- SCROLLABLE BODY -->
            <div class="overflow-y-auto p-6 space-y-6">
                <!-- PROFILE -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">
                        Default Profile
                    </h3>

                    <select
                        class="w-full p-2 rounded-lg border dark:bg-zinc-800 dark:border-zinc-700"
                        (change)="selectedProfile.set($any($event.target).value)"
                    >
                        @for (profile of profiles; track profile) {
                            <option [value]="profile">{{ profile }}</option>
                        }
                    </select>
                </section>

                <!-- THEME -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">Theme</h3>

                    <select
                        class="w-full p-2 rounded-lg border dark:bg-zinc-800 dark:border-zinc-700"
                        (change)="selectedTheme.set($any($event.target).value)"
                    >
                        @for (theme of themes; track theme) {
                            <option [value]="theme">{{ theme }}</option>
                        }
                    </select>
                </section>

                <!-- FONT FAMILY -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">Font Family</h3>

                    <select
                        class="w-full p-2 rounded-lg border dark:bg-zinc-800 dark:border-zinc-700"
                        (change)="selectedFont.set($any($event.target).value)"
                    >
                        @for (font of fontFamilies; track font) {
                            <option [value]="font">{{ font }}</option>
                        }
                    </select>
                </section>

                <!-- FONT SIZE -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">
                        Font Size (px)
                    </h3>

                    <input
                        type="range"
                        min="10"
                        max="20"
                        [value]="selectedFontSize()"
                        (input)="selectedFontSize.set(+$any($event.target).value)"
                        class="w-full"
                    />

                    <div class="text-sm mt-1 text-right text-zinc-500">
                        {{ selectedFontSize() }} px
                    </div>
                </section>

                <!-- SCROLLBACK -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">Scrollback</h3>

                    <select
                        class="w-full p-2 rounded-lg border dark:bg-zinc-800 dark:border-zinc-700"
                        (change)="selectedScrollback.set(+$any($event.target).value)"
                    >
                        @for (sb of scrollbacks; track sb) {
                            <option [value]="sb">{{ sb }}</option>
                        }
                    </select>
                </section>

                <!-- LINE HEIGHT -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">Line Height</h3>

                    <input
                        type="range"
                        min="1"
                        max="2"
                        step="0.1"
                        [value]="selectedLineHeight()"
                        (input)="selectedLineHeight.set(+$any($event.target).value)"
                        class="w-full"
                    />

                    <div class="text-sm mt-1 text-right text-zinc-500">
                        {{ selectedLineHeight() }}
                    </div>
                </section>

                <!-- CURSOR STYLE -->
                <section>
                    <h3 class="font-medium mb-2 text-zinc-700 dark:text-zinc-300">Cursor Style</h3>

                    <div class="grid grid-cols-3 gap-2">
                        @for (cursor of cursorStyles; track cursor) {
                            <button
                                (click)="selectedCursor.set(cursor)"
                                class="p-2 rounded-lg border hover:bg-zinc-100 dark:hover:bg-zinc-800 transition"
                                [class.bg-blue-500]="selectedCursor() === cursor"
                                [class.text-white]="selectedCursor() === cursor"
                            >
                                {{ cursor }}
                            </button>
                        }
                    </div>
                </section>
            </div>
        </div>
    </div>
}
